# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to check out and test (branch, tag, or SHA)"
        required: false
        default: "haiku"
      force-install:
        description: "Reinstall system disk, even when it was found in our cache"
        required: false
        default: false
        type: boolean

concurrency:
  group: haiku-build-and-test
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    env:
      HAIKU_NIGHTLY_VERSION: hrev59861

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7

      - name: Get ponyc
        run: git clone --depth 1 --single-branch --branch ${{ inputs.ref || 'haiku' }} https://github.com/ahwayakchih/ponyc.git && ls -la

      - name: Create source for LIBS_TAG
        run: |
          echo $HAIKU_NIGHTLY_VERSION >haiku_libs_tag.source
          sha256sum \
            ponyc/lib/CMakePresets.json \
            ponyc/CMakeLists.txt \
            ponyc/lib/CMakeLists.txt \
            ponyc/lib/build-libs.cmake \
            ponyc/lib/llvm/patches/* \
            >>haiku_libs_tag.source

      # This step is from ponyc's workflow
      - name: Check libs cache
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('haiku_libs_tag.source') }}
        run: |
          # The libs live in the VM but the .libs-cache-miss marker and its gate
          # live on the host, so the decision has to happen here, before the VM
          # boots. Off main (a manual dispatch of a branch): build LLVM in the VM if
          # it isn't cached (hit=false; the "Build libs" step pushes it). On main (a
          # scheduled run, or a dispatch left on main): if it isn't cached, write
          # the marker and skip -- we don't build LLVM on main.
          cd ponyc
          if python3 .ci-scripts/libs-cache/oci_libs_cache.py exists --platform haiku --tag "$LIBS_TAG"; then
            echo "Libs present in the main GHCR cache."
            echo "hit=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.ref }}" != "haiku" ]; then
            if python3 .ci-scripts/libs-cache/branch_libs_cache.py exists --platform haiku --tag "$LIBS_TAG"; then
              echo "Libs present in the branch GHCR cache."
              echo "hit=true" >> "$GITHUB_OUTPUT"
            else
              echo "Off-main manual run, cache miss; the VM will build LLVM."
              echo "hit=false" >> "$GITHUB_OUTPUT"
            fi
          else
            touch .libs-cache-miss
          fi

      # Avoid burdening Haiku project by caching ISO and configured system disk
      - name: Restore Haiku system disk and ISO from our own cache
        id: haiku-cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ${{ format('{0}/vm-artifacts/haiku.iso', runner.temp) }}
            ${{ format('{0}/vm-artifacts/haiku_system.qcow2', runner.temp) }}
            haiku_vm_key*
          key: ${{ env.HAIKU_NIGHTLY_VERSION }}

      - name: Force reinstall by removing cached system disk
        if: ${{ inputs.force-install }}
        run: rm -f "${{ runner.temp }}/vm-artifacts/haiku_system.qcow2"


      - name: Provision VM
        id: haiku-provision
        run: |
          export GITHUB_WORKSPACE=${GITHUB_WORKSPACE}/ponyc
          bash ponyc/.ci-scripts/haiku/haiku-provision.bash

      - name: Store Haiku ISO and system disk in our own cache
        if: ${{ inputs.force-install || steps.haiku-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: |
            ${{ format('{0}/vm-artifacts/haiku.iso', runner.temp) }}
            ${{ format('{0}/vm-artifacts/haiku_system.qcow2', runner.temp) }}
            haiku_vm_key*
          key: ${{ steps.haiku-cache.outputs.cache-primary-key }}

      # This step is from ponyc's workflow
      # It will not restore anything, but tests to see if haiku-libs-cache.bash does not crash
      - name: Restore libs
        if: ${{ hashFiles('ponyc/.libs-cache-miss') == '' && steps.check.outputs.hit == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('haiku_libs_tag.source') }}
        run: bash ponyc/.ci-scripts/haiku/haiku-libs-cache.bash restore

      # Our own cache of libs
      - name: Restore libs.zip from our own cache
        id: libs-cache
        uses: actions/cache/restore@v6
        with:
          path: libs.zip
          key: ${{ hashFiles('haiku_libs_tag.source') }}

      # Our own restore of libs
      - name: Restore libs from libs.zip
        if: ${{ steps.libs-cache.outputs.cache-hit == 'true' }}
        run: |
          set -e
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i haiku_vm_key -P 2222 ./libs.zip user@localhost:/boot/home/Desktop/libs.zip
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i haiku_vm_key -p 2222 user@localhost /bin/sh <<'EOF'
            set -e
            cd /Data/ponyc
            unzip /boot/home/Desktop/libs.zip
          EOF

      # This step is from ponyc's workflow
      # It will build libs, but will not cache them, as that needs permission to store stuff in ghcr
      - name: Build libs
        if: ${{ steps.libs-cache.outputs.cache-hit != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIBS_TAG: ${{ hashFiles('haiku_libs_tag.source') }}
        # When off main and the libs aren't cached, build LLVM in the VM (hours)
        # and push it to the branch cache, so a re-dispatch reuses the build.
        run: bash ponyc/.ci-scripts/haiku/haiku-libs-cache.bash build-push-branch

      # We keep our own libs cache
      - name: Cache libs
        if: ${{ steps.libs-cache.outputs.cache-hit != 'true' }}
        run: |
          set -e
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i haiku_vm_key -p 2222 user@localhost /bin/sh <<'EOF'
            set -e
            cd /Data/ponyc
            zip -r -y /boot/home/Desktop/libs.zip build/libs lib/llvm/src/compiler-rt/lib/builtins
          EOF
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i haiku_vm_key -P 2222 user@localhost:/boot/home/Desktop/libs.zip ./libs.zip

      - name: Store libs.zip in our custom cache
        if: ${{ steps.libs-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: libs.zip
          key: ${{ steps.libs-cache.outputs.cache-primary-key }}

      - name: Build and test
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i haiku_vm_key -p 2222 user@localhost /bin/sh <<'EOF'
            set -e
            cd /Data/ponyc
            cmake --preset debug -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
            cmake --build --preset debug
            cmake --build --preset debug --target pony-doc-tests pony-lint-tests pony-lsp-tests
            ctest --preset debug -L ci-core
            ctest --preset debug -R pony-doc-tests
            ctest --preset debug -R pony-lint-tests
            ctest --preset debug -R pony-lsp-tests
            cmake --preset release -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++
            cmake --build --preset release
            ctest --preset release -L ci-core
          EOF

      - name: Shutdown VM
        if: ${{ always() }}
        run: |
          pkill -f qemu-system-x86 || true
